name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker-compose.yml
        run: docker compose config -q

  build-inference:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build inference image
        run: docker build -t emotion-inference ./inference
